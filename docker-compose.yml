# Voice app — joins core's theitemapp network.
# Usage: docker compose up -d --build
#
# Brings up four services:
#   voice         — Angular Native Federation remote (caddy serving /mf/voice/*)
#   voice-api     — Fastify proxy (registers with core, /voice-api/api/*)
#   kokoro-tts    — Kokoro-FastAPI OpenAI-compatible TTS upstream (GPU image)
#   whisper-stt   — openai-whisper-asr-webservice multipart upstream (GPU image)
#
# To run on a CPU-only host, override KOKORO_IMAGE / WHISPER_IMAGE with the
# `-cpu` / non-`-gpu` tags and remove the deploy stanzas (or compose will fail
# to reserve the GPU device).

services:
  voice:
    build:
      context: .
      dockerfile: platform/Dockerfile
    ports:
      - "${VOICE_WEB_PORT:-4206}:80"
    restart: unless-stopped

  voice-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      VOICE_API_PORT: "3005"
      VOICE_APP_KEY: "voice"
      VOICE_REGISTRATION_BASE_URL: "http://voice-api:3005"
      APP_REGISTRATION_KEY: "${APP_REGISTRATION_KEY:-}"
      CORE_API_URL: "http://backend:3001"
      VOICE_CORE_API_KEY: "${VOICE_CORE_API_KEY:-}"
      KOKORO_BASE_URL: "http://kokoro-tts:8880"
      WHISPER_BASE_URL: "http://whisper-stt:9000"
      VOICE_DEFAULT_VOICE: "${VOICE_DEFAULT_VOICE:-af_sky}"
      VOICE_DEFAULT_MODEL: "${VOICE_DEFAULT_MODEL:-kokoro}"
      VOICE_UPSTREAM_TIMEOUT_MS: "${VOICE_UPSTREAM_TIMEOUT_MS:-120000}"
    ports:
      - "${VOICE_API_PORT:-3005}:3005"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3005/api/health', (r) => { r.resume(); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - kokoro-tts
      - whisper-stt

  kokoro-tts:
    image: "${KOKORO_IMAGE:-ghcr.io/remsky/kokoro-fastapi-gpu:latest}"
    environment:
      - ONNX_NUM_THREADS=4
    ports:
      - "${KOKORO_PORT:-8880}:8880"
    restart: unless-stopped
    # Override KOKORO_IMAGE=ghcr.io/remsky/kokoro-fastapi-cpu:latest if running
    # on a host without an NVIDIA GPU. The deploy stanza below reserves a GPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  whisper-stt:
    image: "${WHISPER_IMAGE:-onerahmet/openai-whisper-asr-webservice:latest-gpu}"
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-base}
      - ASR_ENGINE=${WHISPER_ENGINE:-openai_whisper}
    ports:
      - "${WHISPER_PORT:-9000}:9000"
    restart: unless-stopped
    # Override WHISPER_IMAGE=onerahmet/openai-whisper-asr-webservice:latest if
    # running on a host without an NVIDIA GPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  default:
    name: theitemapp
    external: true
