<button
  class="speakBtn"
  [class.busy]="state() !== 'idle'"
  [class.armed]="autoMode() && armed()"
  [attr.aria-pressed]="autoMode() ? armed() : null"
  [attr.aria-label]="label()"
  [attr.title]="autoMode()
      ? (armed() ? 'Auto-speak ON — click to turn off' : 'Auto-speak OFF — click to turn on')
      : (state() === 'loading' ? 'Synthesizing…' : (state() === 'playing' ? 'Stop' : label()))"
  [disabled]="state() === 'loading' || (!autoMode() && !text())"
  (click)="onClick()"
>
  @switch (state()) {
    @case ('loading') {
      <svg class="icon spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
    }
    @case ('playing') {
      <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="6" y="6" width="12" height="12" rx="1"/>
      </svg>
    }
    @default {
      <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    }
  }
</button>

@if (lastError(); as err) {
  <p class="err">{{ err }}</p>
}
