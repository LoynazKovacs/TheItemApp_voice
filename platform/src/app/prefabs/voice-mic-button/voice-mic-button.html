<div class="micRow">
  <button
    class="micBtn"
    [class.recording]="state() === 'recording' && !handsFree()"
    [class.busy]="state() === 'transcribing'"
    [class.handsFree]="handsFree()"
    [class.listening]="listening()"
    [attr.aria-pressed]="state() === 'recording'"
    [attr.aria-label]="label()"
    [attr.title]="handsFree()
        ? (state() === 'transcribing' ? 'Transcribing…' : (listening() ? 'Listening…' : 'Hands-free on — speak, auto-sends after a pause'))
        : (state() === 'recording' ? 'Recording — release to stop' : (state() === 'transcribing' ? 'Transcribing…' : label()))"
    [disabled]="state() === 'transcribing' || handsFree()"
    (mousedown)="onPressStart($event)"
    (touchstart)="onPressStart($event)"
  >
    @switch (state()) {
      @case ('recording') {
        <span class="dot"></span>
      }
      @case ('transcribing') {
        <svg class="icon spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
      }
      @default {
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="2" width="6" height="13" rx="3"/>
          <path d="M19 10a7 7 0 0 1-14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      }
    }
  </button>

  <!-- Separate hands-free toggle. Kept off the main button so push-to-talk
       fires instantly on mousedown with no double-click / hold-detection delay. -->
  <button
    class="modeToggle"
    type="button"
    [class.on]="handsFree()"
    [attr.aria-pressed]="handsFree()"
    [attr.title]="handsFree()
        ? 'Hands-free listening ON — click to turn off'
        : 'Hands-free listening OFF — click for continuous listening (auto-sends after a pause)'"
    (click)="toggleHandsFree($event)"
  >
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/>
      <path d="M16.24 7.76a6 6 0 0 1 0 8.48"/>
      <path d="M7.76 16.24a6 6 0 0 1 0-8.48"/>
    </svg>
  </button>
</div>

@if (lastError(); as err) {
  <p class="err">{{ err }}</p>
}
